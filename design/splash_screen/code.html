<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0A0E1A; /* Dark Navy requested for Splash */
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom styles for the splash effect */
        .glow-sphere {
            background: radial-gradient(circle, rgba(0, 102, 255, 0.15) 0%, rgba(10, 14, 26, 0) 70%);
        }
        .logo-glow {
            filter: drop-shadow(0 0 20px rgba(0, 102, 255, 0.4));
        }
        .progress-bar-container {
            width: 140px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-bar-fill {
            width: 40%;
            height: 100%;
            background: #0066FF; /* Electric Blue */
            border-radius: 2px;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#ffdcc4",
                    "primary-fixed": "#dfe2f3",
                    "on-error": "#ffffff",
                    "inverse-primary": "#c3c6d7",
                    "on-primary": "#ffffff",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#2f1500",
                    "on-secondary": "#ffffff",
                    "surface-dim": "#dcd9da",
                    "inverse-on-surface": "#f3f0f1",
                    "on-tertiary-fixed-variant": "#6f3900",
                    "on-primary-fixed": "#171b28",
                    "primary-fixed-dim": "#c3c6d7",
                    "on-tertiary-container": "#c96b00",
                    "tertiary-fixed-dim": "#ffb77f",
                    "surface-container": "#f0edee",
                    "outline": "#76767c",
                    "inverse-surface": "#313031",
                    "on-secondary-fixed-variant": "#003fa4",
                    "error": "#ba1a1a",
                    "on-background": "#1c1b1c",
                    "surface": "#fcf8f9",
                    "surface-container-high": "#ebe7e8",
                    "primary-container": "#171b28",
                    "secondary-container": "#0266ff",
                    "on-tertiary": "#ffffff",
                    "on-surface": "#1c1b1c",
                    "tertiary": "#000000",
                    "on-tertiary-fixed": "#2f1500",
                    "secondary": "#0050cc",
                    "primary": "#000000",
                    "on-secondary-fixed": "#001849",
                    "surface-tint": "#5a5e6d",
                    "surface-container-highest": "#e5e2e3",
                    "on-surface-variant": "#46464c",
                    "outline-variant": "#c7c6cc",
                    "secondary-fixed": "#dae1ff",
                    "surface-container-low": "#f6f3f4",
                    "surface-container-lowest": "#ffffff",
                    "error-container": "#ffdad6",
                    "background": "#fcf8f9",
                    "on-primary-fixed-variant": "#434654",
                    "surface-variant": "#e5e2e3",
                    "on-secondary-container": "#f9f7ff",
                    "on-primary-container": "#808393",
                    "surface-bright": "#fcf8f9",
                    "secondary-fixed-dim": "#b3c5ff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "sm": "8px",
                    "container-padding": "20px",
                    "xl": "32px",
                    "md": "16px",
                    "unit": "4px",
                    "xs": "4px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-sm": ["Inter"],
                    "headline-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-sm": ["Inter"],
                    "label-sm": ["Inter"],
                    "display-lg": ["Inter"]
            },
            "fontSize": {
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                    "display-lg": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#0A0E1A] h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Subtle background glow -->
<div class="glow-sphere absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] pointer-events-none"></div>
<!-- Main Content Canvas -->
<div class="z-10 flex flex-col items-center justify-center space-y-12">
<!-- Minimalist Tech-Forward Logo -->
<div class="relative group">
<div class="logo-glow flex items-center justify-center w-24 h-24 bg-white/5 border border-white/10 rounded-2xl backdrop-blur-xl">
<!-- Geometric Icon using material symbol as base with custom styling -->
<span class="material-symbols-outlined text-white text-[56px]" style="font-variation-settings: 'wght' 200;">
                    construction
                </span>
</div>
<!-- Floating accent element for extra tech feel -->
<div class="absolute -top-1 -right-1 w-4 h-4 bg-[#0066FF] rounded-full border-4 border-[#0A0E1A]"></div>
</div>
<!-- Brand Headline (From JSON - Handwerker) -->
<div class="text-center">
<h1 class="font-display-lg text-display-lg font-bold tracking-tighter text-white">
                Handwerker
            </h1>
<p class="font-label-md text-label-md uppercase tracking-[0.3em] text-[#0066FF] mt-2 opacity-80">
                On-Demand
            </p>
</div>
</div>
<!-- Bottom Loading State -->
<div class="absolute bottom-24 flex flex-col items-center space-y-4">
<!-- Progress Bar -->
<div class="progress-bar-container">
<div class="progress-bar-fill"></div>
</div>
<!-- Status Label -->
<p class="font-label-sm text-label-sm text-white/30 uppercase tracking-widest">
            Initializing Services
        </p>
</div>
<!-- Background texture detail -->
<div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 32px 32px;">
</div>
<!-- Decorative Corner Accents -->
<div class="absolute top-8 left-8 w-8 h-8 border-t-2 border-l-2 border-white/5"></div>
<div class="absolute top-8 right-8 w-8 h-8 border-t-2 border-r-2 border-white/5"></div>
<div class="absolute bottom-8 left-8 w-8 h-8 border-b-2 border-l-2 border-white/5"></div>
<div class="absolute bottom-8 right-8 w-8 h-8 border-b-2 border-r-2 border-white/5"></div>
</body></html>
